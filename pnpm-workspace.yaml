packages:
  - apps/web
  - packages/db
  - packages/game-engine

overrides:
  "@esbuild-kit/core-utils@3.3.2>esbuild": 0.25.12
  postcss: 8.5.16
  ws: 8.21.0

supportedArchitectures:
  os:
    - current
    - linux
  cpu:
    - current
    - x64
  libc:
    - glibc

allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true

# Match the repository's supply-chain policy: do not install releases younger
# than seven days unless explicitly excluded after review.
minimumReleaseAge: 10080
