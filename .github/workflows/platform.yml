name: Tact

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  check:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: "11.9.0"

      - uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm check
