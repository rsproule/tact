name: vNext platform

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  check:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "11.9.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "24.12.0"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm check
